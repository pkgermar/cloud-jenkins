<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

</head>
<body>

<nav>
    <a href="index.html">🏠 Resume</a>
    <a href="gallery.html">📸 Gallery</a>
</nav>


<section>

    <h2>My Gallery</h2>

    <div class="gallery">

        <div class="card">
            <a href="grad.jpg" target="_blank">
                <img src="grad.jpg" alt="Graduation Photo">
            </a>
            <h3>Graduation Photo</h3>
        </div>

        <div class="card">
            <a href="IMG1.jpg" target="_blank">
   		 <img src="IMG1.jpg" alt="Photo 1">
	    </a>
            <h3>TechStart Team</h3>
        </div>

        <div class="card">
            <a href="IMG2.jpg" target="_blank">
    		<img src="IMG2.jpg" alt="Photo 2">
	    </a>
            <h3>TechStart Family</h3>
        </div>

    </div>

</section>

<footer>
    <p>
        🌸 "Success is not the key to happiness.
        Happiness is the key to success." 🌸
    </p>
</footer>

<script>

function createPetal(){

    const petal = document.createElement("div");

    petal.classList.add("petal");

    const size = Math.random() * 12 + 8;

    petal.style.width = size + "px";
    petal.style.height = size + "px";

    petal.style.left =
        Math.random() * window.innerWidth + "px";

    document.body.appendChild(petal);

    let posY = -20;

    let posX = parseFloat(petal.style.left);

    let drift = (Math.random() * 2) - 1;

    let speed = Math.random() * 2 + 1;

    let rotation = Math.random() * 360;

    const fall = setInterval(() => {

        posY += speed;

        posX += drift;

        rotation += 2;

        petal.style.top = posY + "px";

        petal.style.left = posX + "px";

        petal.style.transform =
            `rotate(${rotation}deg)`;

        if(posY > window.innerHeight + 50){

            clearInterval(fall);

            petal.remove();

        }

    },20);

}

setInterval(createPetal, 1200);

</script>

</body>
</html>
